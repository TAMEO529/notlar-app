<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Notlarım & Yapılacaklar</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#16161e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Notlarım" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f13;
      font-family: 'Sora', sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
    }
    #app {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      min-height: 100dvh;
      background: #16161e;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .glow {
      position: absolute;
      top: -80px; left: 50%;
      transform: translateX(-50%);
      width: 300px; height: 200px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(77,150,255,0.15) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .header {
      padding: 52px 24px 0;
      position: relative; z-index: 1;
    }
    .header h1 { font-size: 26px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
    .header p { font-size: 13px; color: #555; margin-top: 4px; }
    .tabs {
      display: flex; gap: 8px;
      padding: 18px 24px 0;
      position: relative; z-index: 1;
    }
    .tab {
      flex: 1; padding: 11px 0;
      background: #1e1e28;
      color: #555;
      border: none; border-radius: 12px;
      font-family: 'Sora', sans-serif;
      font-weight: 700; font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: #4D96FF;
      color: #fff;
      box-shadow: 0 4px 20px rgba(77,150,255,0.3);
    }
    .content {
      flex: 1;
      padding: 18px 24px 110px;
      overflow-y: auto;
      position: relative; z-index: 1;
    }

    /* ADD FORM */
    .add-form {
      background: #1e1e28;
      border: 1px solid #2a2a38;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      animation: slideDown 0.2s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .add-form input, .add-form textarea {
      width: 100%;
      background: #13131a;
      border: 1px solid #2a2a38;
      border-radius: 10px;
      padding: 11px 14px;
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      outline: none;
      margin-bottom: 8px;
    }
    .add-form textarea { resize: none; color: #ccc; font-size: 14px; }
    .color-row {
      display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 4px;
    }
    .color-dot {
      width: 24px; height: 24px; border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border 0.15s;
      flex-shrink: 0;
    }
    .color-dot.selected { border-color: #fff; }
    .btn-add {
      margin-left: auto;
      background: #4D96FF; color: #fff;
      border: none; border-radius: 8px;
      padding: 6px 16px;
      font-family: 'Sora', sans-serif;
      font-weight: 700; font-size: 13px;
      cursor: pointer;
    }

    /* TODO ITEMS */
    .todo-item {
      display: flex; align-items: center; gap: 12px;
      background: #1e1e28;
      border: 1px solid #2a2a38;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 8px;
      transition: opacity 0.2s;
    }
    .todo-item.done { opacity: 0.45; }
    .todo-check {
      width: 22px; height: 22px; border-radius: 50%;
      border: 2px solid #4D96FF;
      background: transparent;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
      font-size: 12px; color: #fff;
    }
    .todo-text {
      flex: 1; color: #e0e0e0; font-size: 15px;
    }
    .todo-item.done .todo-text { text-decoration: line-through; color: #555; }
    .btn-del {
      background: none; border: none;
      color: #444; cursor: pointer;
      font-size: 16px; padding: 4px;
      line-height: 1;
    }
    .section-label {
      font-size: 11px; font-weight: 700;
      color: #3a3a4a; letter-spacing: 2px;
      margin: 24px 0 10px;
    }

    /* NOTE CARDS */
    .notes-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .note-card {
      background: #1e1e28;
      border-radius: 16px;
      padding: 14px;
      cursor: pointer;
      position: relative;
      min-height: 100px;
      border: 1px solid #2a2a3822;
      border-top-width: 3px;
      transition: transform 0.15s;
    }
    .note-card:active { transform: scale(0.97); }
    .note-title { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 6px; line-height: 1.3; }
    .note-body {
      font-size: 12px; color: #666; line-height: 1.5;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    .note-footer {
      margin-top: 10px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .note-date { font-size: 10px; color: #444; }
    .btn-note-del { background: none; border: none; color: #333; cursor: pointer; font-size: 12px; padding: 2px; }

    /* EMPTY STATE */
    .empty {
      text-align: center; padding: 60px 20px;
      color: #3a3a4a;
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 32px;
      right: 50%;
      transform: translateX(50%) translateX(min(160px, calc(50vw - 32px)));
      width: 58px; height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4D96FF, #C77DFF);
      border: none;
      color: #fff;
      font-size: 30px; font-weight: 300;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 32px rgba(77,150,255,0.4);
      z-index: 50;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .fab:active {
      transform: translateX(50%) translateX(min(160px, calc(50vw - 32px))) scale(0.93);
    }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1e1e28;
      border-radius: 24px 24px 0 0;
      padding: 24px;
      width: 100%; max-width: 480px;
    }
    .modal h3 { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 14px; }
    .modal input, .modal textarea {
      width: 100%;
      background: #13131a;
      border: 1px solid #2a2a38;
      border-radius: 10px;
      padding: 11px 14px;
      color: #fff;
      font-family: 'Sora', sans-serif;
      font-size: 15px;
      outline: none;
      margin-bottom: 8px;
    }
    .modal textarea { resize: none; color: #ccc; font-size: 14px; }
    .btn-save {
      margin-top: 10px; width: 100%;
      background: #4D96FF; color: #fff;
      border: none; border-radius: 12px;
      padding: 14px 0;
      font-family: 'Sora', sans-serif;
      font-weight: 700; font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="glow"></div>

  <div class="header">
    <h1 id="header-title">📋 Yapılacaklar</h1>
    <p id="header-sub"></p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab(0)">Yapılacaklar</button>
    <button class="tab" onclick="switchTab(1)">Notlar</button>
  </div>

  <div class="content" id="content"></div>

  <button class="fab" onclick="toggleAdd()">+</button>
</div>

<!-- Note Edit Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <h3>Notu Düzenle</h3>
    <input id="modal-title" placeholder="Başlık" />
    <textarea id="modal-body" rows="4" placeholder="Not içeriği..."></textarea>
    <button class="btn-save" onclick="saveEdit()">Kaydet</button>
  </div>
</div>

<script>
const COLORS = ["#FF6B6B","#FFD93D","#6BCB77","#4D96FF","#C77DFF","#FF9A3C"];
let activeTab = 0;
let showAdd = false;
let editingId = null;
let selectedColor = COLORS[0];

let todos = JSON.parse(localStorage.getItem('todos') || 'null') || [
  {id:uid(), text:"Marketten alışveriş yap", done:false, color:"#4D96FF"},
  {id:uid(), text:"Kitabı bitir", done:true, color:"#6BCB77"}
];
let notes = JSON.parse(localStorage.getItem('notes') || 'null') || [
  {id:uid(), title:"Fikir listesi", body:"Yeni proje fikirleri burada...", color:"#FFD93D", date:today()}
];

function uid() { return Math.random().toString(36).substr(2,9); }
function today() {
  return new Date().toLocaleDateString('tr-TR',{day:'numeric',month:'short'});
}
function save() {
  localStorage.setItem('todos', JSON.stringify(todos));
  localStorage.setItem('notes', JSON.stringify(notes));
}

function switchTab(i) {
  activeTab = i;
  showAdd = false;
  selectedColor = COLORS[0];
  document.querySelectorAll('.tab').forEach((t,idx) => t.classList.toggle('active', idx===i));
  render();
}

function toggleAdd() {
  showAdd = !showAdd;
  selectedColor = COLORS[0];
  render();
  if (showAdd) {
    setTimeout(() => {
      const inp = document.querySelector('.add-form input');
      if (inp) inp.focus();
    }, 50);
  }
}

function selectColor(c, el) {
  selectedColor = c;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
  el.classList.add('selected');
}

function addTodo() {
  const inp = document.getElementById('todo-input');
  if (!inp || !inp.value.trim()) return;
  todos.unshift({id:uid(), text:inp.value.trim(), done:false, color:selectedColor});
  save(); showAdd=false; render();
}

function toggleTodo(id) {
  const t = todos.find(x=>x.id===id);
  if (t) t.done = !t.done;
  save(); render();
}

function deleteTodo(id) {
  todos = todos.filter(x=>x.id!==id);
  save(); render();
}

function addNote() {
  const title = document.getElementById('note-title-inp');
  const body = document.getElementById('note-body-inp');
  if (!title || !title.value.trim()) return;
  notes.unshift({id:uid(), title:title.value.trim(), body:body?body.value:'', color:selectedColor, date:today()});
  save(); showAdd=false; render();
}

function deleteNote(id) {
  notes = notes.filter(x=>x.id!==id);
  save(); render();
}

function openEdit(id) {
  const n = notes.find(x=>x.id===id);
  if (!n) return;
  editingId = id;
  document.getElementById('modal-title').value = n.title;
  document.getElementById('modal-body').value = n.body;
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (e.target.id==='modal') {
    document.getElementById('modal').classList.remove('open');
    editingId = null;
  }
}

function saveEdit() {
  const n = notes.find(x=>x.id===editingId);
  if (n) {
    n.title = document.getElementById('modal-title').value;
    n.body = document.getElementById('modal-body').value;
    save(); render();
  }
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

function colorDots(selected) {
  return COLORS.map(c =>
    `<div class="color-dot${c===selected?' selected':''}" style="background:${c}" onclick="selectColor('${c}',this)"></div>`
  ).join('');
}

function render() {
  const pending = todos.filter(t=>!t.done);
  const done = todos.filter(t=>t.done);

  // Header
  if (activeTab===0) {
    document.getElementById('header-title').textContent = '📋 Yapılacaklar';
    document.getElementById('header-sub').textContent = `${pending.length} bekleyen, ${done.length} tamamlandı`;
  } else {
    document.getElementById('header-title').textContent = '📝 Notlarım';
    document.getElementById('header-sub').textContent = `${notes.length} not`;
  }

  let html = '';

  if (activeTab===0) {
    if (showAdd) {
      html += `<div class="add-form">
        <input id="todo-input" placeholder="Ne yapacaksın?" onkeydown="if(event.key==='Enter')addTodo()" />
        <div class="color-row">${colorDots(selectedColor)}<button class="btn-add" onclick="addTodo()">Ekle</button></div>
      </div>`;
    }
    if (pending.length===0 && done.length===0) {
      html += `<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Henüz görev yok. + ile ekle!</div></div>`;
    }
    pending.forEach(t => { html += todoHTML(t); });
    if (done.length>0) {
      html += `<div class="section-label">TAMAMLANANLAR</div>`;
      done.forEach(t => { html += todoHTML(t); });
    }
  } else {
    if (showAdd) {
      html += `<div class="add-form">
        <input id="note-title-inp" placeholder="Başlık" />
        <textarea id="note-body-inp" rows="3" placeholder="Notunu yaz..."></textarea>
        <div class="color-row">${colorDots(selectedColor)}<button class="btn-add" onclick="addNote()">Kaydet</button></div>
      </div>`;
    }
    if (notes.length===0) {
      html += `<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">Henüz not yok. + ile ekle!</div></div>`;
    } else {
      html += `<div class="notes-grid">`;
      notes.forEach(n => { html += noteHTML(n); });
      html += `</div>`;
    }
  }

  document.getElementById('content').innerHTML = html;
}

function todoHTML(t) {
  const checkStyle = `border-color:${t.color};background:${t.done?t.color:'transparent'}`;
  return `<div class="todo-item${t.done?' done':''}">
    <div class="todo-check" style="${checkStyle}" onclick="toggleTodo('${t.id}')">${t.done?'✓':''}</div>
    <span class="todo-text">${escHtml(t.text)}</span>
    <button class="btn-del" onclick="deleteTodo('${t.id}')">✕</button>
  </div>`;
}

function noteHTML(n) {
  return `<div class="note-card" style="border-top-color:${n.color};border-color:${n.color}33" onclick="openEdit('${n.id}')">
    <div class="note-title">${escHtml(n.title)}</div>
    ${n.body?`<div class="note-body">${escHtml(n.body)}</div>`:''}
    <div class="note-footer">
      <span class="note-date">${n.date}</span>
      <button class="btn-note-del" onclick="event.stopPropagation();deleteNote('${n.id}')">✕</button>
    </div>
  </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

render();

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
